<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon Wellness System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="page-wrapper">
        <div class="home-card">

            <div class="logo-section">
                <img src="horizon-logo-new.png" alt="Horizon Center Logo" class="logo">
            </div>

            <div class="divider"></div>

            <div class="screen-content">
                <h2>Welcome, Therapist/Patient</h2>
                <p>Please log in to access your account.</p>

                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" placeholder="Enter your username">
                </div>

                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" placeholder="Enter your password">
                </div>

                <a class="primary-button" href="index.html" style="margin-top: 20px;">Login</a>
                <a class="secondary-button" href="#" style="margin-top: 20px;">Forgot Password?</a>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
