<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Search - Horizon Wellness System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-wrapper">
        <div class="home-card search-page-card">
            <div class="top-nav">
                <button class="link-back" onclick="location.href='index.html'">← Back</button>
                <span class="top-nav-title">Patient Search</span>
            </div>

            <div class="search-content">
                <div class="search-row">
                    <label for="patientName">Search Patient:</label>
                    <input list="patients" id="patientName" placeholder="Type or select a patient" />
                    <datalist id="patients">
                        <option value="John Doe"></option>
                    </datalist>
                    <button class="primary-button" onclick="searchPatient()">Search 🔎</button>
                </div>

                <div class="results-section">
                    <div id="patientResult">
                        <div class="no-results">Enter John Doe to display mock patient record.</div>
                    </div>
                </div>
            </div>

            <div class="search-footer">
                <a class="outline-button" onclick="location.href='session.html'">[ Record Session ]</a>
                <a class="outline-button" onclick="location.href='session.html'">[ Edit Goals ]</a>
                <a class="outline-button" onclick="location.href='index.html'">[ Back ]</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
