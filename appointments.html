<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointments - Horizon Wellness System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-wrapper">
        <div class="home-card appointments-page-card">
            <div class="top-nav">
                <button class="link-back" onclick="location.href='index.html'">← Back</button>
                <span class="top-nav-title">Appointments</span>
            </div>

            <div class="appointments-content">
                <div class="search-row">
                    <label for="appointmentPatientName">Patient Name:</label>
                    <input type="text" id="appointmentPatientName" placeholder="Enter patient name">
                </div>
                <div class="search-row">
                    <label for="appointmentPatientDOB">Patient DOB:</label>
                    <input type="date" id="appointmentPatientDOB" placeholder="Enter patient date of birth">
                    <button class="primary-button" onclick="showAppointments()">Search</button>
                </div>

                <div id="appointmentsResult">
                    <div class="no-results">Enter John Doe to view mock appointments.</div>
                </div>
            </div>

            <div class="search-footer">
                <a class="outline-button" href="index.html" style="width: auto;">[ Return to Home ]</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
